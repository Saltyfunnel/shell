########################################################################################
# HYPRLAND 2026 UNIFIED CONFIG (AMD/Intel/NVIDIA)
########################################################################################

# Load GPU environment (Critical for NVIDIA/Drivers)
source = ~/.config/hypr/gpu-env.conf

monitor=,2560x1440@165,auto,1

$terminal  = kitty
$editor    = zeditor
$browser   = firefox
$filemanager = kitty -e yazi
$ipc = qs -c noctalia-shell ipc call

#################
### AUTOSTART ###
#################

exec-once = swww-daemon --format xrgb
exec-once = qs -c noctalia-shell
exec-once = udiskie &
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

###############
### INPUT   ###
###############
input {
    kb_layout = gb
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Escape, exec, hyprctl dispatch exit
bind = $mainMod, D, exec, $ipc launcher toggle
bind = $mainMod, W, exec, $ipc wallpaper toggle
bind = $mainMod, I, exec, $ipc settings toggle
bind = $mainMod, C, exec, $editor
bind = $mainMod, B, exec, $browser
bind = $mainMod, F, exec, $filemanager
bind = $mainMod, Q, killactive
bind = $mainMod, V, togglefloating

# Focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Mouse Binds
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media keys
bindel = , XF86AudioRaiseVolume, exec, $ipc volume increase
bindel = , XF86AudioLowerVolume, exec, $ipc volume decrease
bindl = , XF86AudioMute, exec, $ipc volume muteOutput
bindel = , XF86MonBrightnessUp, exec, $ipc brightness increase
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease

#####################
### LOOK & FEEL   ###
#####################
general {
  gaps_in = 5
  gaps_out = 10
}

decoration {
  rounding = 20
  rounding_power = 2

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 3
    passes = 2
    vibrancy = 0.1696
  }
}

animations {
    enabled = true
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 6, wind, slide
    animation = workspaces, 1, 5, wind
}

##############################
### WINDOW RULES           ###
##############################
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$

windowrule = opacity 0.90 0.90 1.0, match:class ^(firefox)$
windowrule = opacity 0.80, match:class ^(spotify)$
windowrule = opacity 0.80, match:class ^(kitty)$
windowrule = opacity 0.80, match:class ^(dev.zed.Zed)$

source = /home/test/.config/hypr/noctalia/noctalia-colors.conf
