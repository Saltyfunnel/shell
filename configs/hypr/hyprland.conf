########################################################################################
# HYPRLAND 2026 UNIFIED CONFIG (AMD/Intel/NVIDIA)
########################################################################################

# Load GPU environment (Critical for NVIDIA/Drivers)
source = ~/.config/hypr/gpu-env.conf

monitor=,2560x1440@165,auto,1

$terminal  = kitty
$editor    = zeditor
$browser   = firefox
$filemanager = nemo

#################
### AUTOSTART ###
#################

exec-once = swww-daemon --format xrgb
exec-once = qs -c noctalia-shell
exec-once = udiskie &
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

###############
### INPUT   ###
###############
input {
    kb_layout = gb
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Escape, exec, hyprctl dispatch exit
bind = $mainMod, C, exec, $editor
bind = $mainMod, B, exec, $browser
bind = $mainMod, F, exec, $filemanager
bind = $mainMod, I, exec, $terminal -e btop
bind = $mainMod, Q, killactive
bind = $mainMod, V, togglefloating

# Focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Mouse Binds
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#####################
### LOOK & FEEL   ###
#####################
general {
    gaps_in = 3
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 3
    }
}

animations {
    enabled = true
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 6, wind, slide
    animation = workspaces, 1, 5, wind
}

##############################
### WINDOW RULES           ###
##############################
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nemo)$
windowrule = center on, match:class ^(nemo)$
windowrule = size 1200 800, match:class ^(nemo)$
windowrule = float on, match:title ^(WallpaperPicker)$
windowrule = center on, match:title ^(WallpaperPicker)$

windowrule = opacity 0.90 0.90 1.0, match:class ^(firefox)$
windowrule = opacity 0.90, match:class ^(codium)$
windowrule = opacity 0.80, match:class ^(spotify)$
windowrule = opacity 0.80, match:class ^(kitty)$
